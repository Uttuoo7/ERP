[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    --cov=backend
    --cov-report=term-missing
    --cov-report=html:coverage_html
    --cov-fail-under=50
markers =
    unit: Unit tests (no DB, no network)
    integration: Integration tests requiring PostgreSQL
    procurement: Procurement chain tests
    inventory: Inventory engine tests
    finance: Finance and matching tests
    workflow: Workflow engine tests
    rbac: RBAC and security tests
    api: API endpoint tests
    performance: Performance and load tests
    slow: Tests that take more than 1 second
env_files =
    .env.test
