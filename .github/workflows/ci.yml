name: ERP CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

# ─── Jobs ────────────────────────────────────────────────────────────────────

jobs:

  # ── 1. Backend Linting ──────────────────────────────────────────────────────
  lint-backend:
    name: "🔍 Backend Lint (ruff)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install linting tools
        run: pip install ruff

      - name: Run ruff lint
        run: ruff check backend/ tests/ --output-format=github

  # ── 2. Backend Tests (PostgreSQL) ──────────────────────────────────────────
  test-backend:
    name: "🧪 Backend Tests (pytest + PostgreSQL)"
    runs-on: ubuntu-latest
    needs: lint-backend

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: erp_test_user
          POSTGRES_PASSWORD: erp_test_password
          POSTGRES_DB: p2p_erp_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U erp_test_user -d p2p_erp_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      TEST_DATABASE_URL: postgresql://erp_test_user:erp_test_password@localhost:5433/p2p_erp_test
      JWT_SECRET: test_jwt_secret_key_for_erp_testing_only
      DISABLE_BACKGROUND_WORKERS: "true"
      CORS_ORIGINS: "http://localhost:5173"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install backend dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov pytest-env httpx psycopg2-binary

      - name: Wait for PostgreSQL to be ready
        run: |
          for i in {1..20}; do
            pg_isready -h localhost -p 5433 -U erp_test_user && break
            echo "Waiting for PostgreSQL... attempt $i"
            sleep 3
          done

      - name: Run pytest with coverage
        run: |
          pytest tests/ \
            -v \
            --tb=short \
            --cov=backend \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=30 \
            -x

      - name: Upload coverage report to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          verbose: true

      - name: Upload coverage HTML artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-html
          path: coverage_html/
          retention-days: 14

  # ── 3. Frontend Build Validation ───────────────────────────────────────────
  build-frontend:
    name: "🏗️ Frontend Build Validation (Vite)"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit || true  # Non-fatal for now

      - name: Build frontend bundle
        run: npm run build
        env:
          VITE_API_BASE_URL: /api

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ── 4. Docker Build Verification ───────────────────────────────────────────
  build-docker:
    name: "🐳 Docker Build Verification"
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.backend
          push: false
          tags: p2p-erp-backend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.frontend
          push: false
          tags: p2p-erp-frontend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 5. Migration Validation ────────────────────────────────────────────────
  validate-migrations:
    name: "🗄️ Migration Validation"
    runs-on: ubuntu-latest
    needs: lint-backend

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: erp_test_user
          POSTGRES_PASSWORD: erp_test_password
          POSTGRES_DB: p2p_erp_migrate_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U erp_test_user -d p2p_erp_migrate_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      TEST_DATABASE_URL: postgresql://erp_test_user:erp_test_password@localhost:5433/p2p_erp_migrate_test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt psycopg2-binary

      - name: Validate schema creation (SQLAlchemy metadata)
        run: |
          python -c "
          import os
          os.environ['DATABASE_URL'] = os.environ['TEST_DATABASE_URL']
          from sqlalchemy import create_engine
          from backend.models import Base
          engine = create_engine(os.environ['TEST_DATABASE_URL'])
          Base.metadata.create_all(bind=engine)
          print('✅ Schema creation validated successfully.')
          "

  # ── 6. Summary Status Gate ─────────────────────────────────────────────────
  ci-success:
    name: "✅ CI All Checks Passed"
    runs-on: ubuntu-latest
    needs: [lint-backend, test-backend, build-frontend, build-docker, validate-migrations]
    if: always()

    steps:
      - name: Check all jobs passed
        run: |
          echo "Lint: ${{ needs.lint-backend.result }}"
          echo "Tests: ${{ needs.test-backend.result }}"
          echo "Frontend: ${{ needs.build-frontend.result }}"
          echo "Docker: ${{ needs.build-docker.result }}"
          echo "Migrations: ${{ needs.validate-migrations.result }}"

          if [[ "${{ needs.test-backend.result }}" == "failure" ]]; then
            echo "❌ Backend tests failed!"
            exit 1
          fi
          if [[ "${{ needs.build-frontend.result }}" == "failure" ]]; then
            echo "❌ Frontend build failed!"
            exit 1
          fi
          echo "✅ All critical checks passed."
